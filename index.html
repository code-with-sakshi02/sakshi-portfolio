<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sakshi Singh - Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <button id="darkModeBtn">🌙 Dark Mode</button>
        
        <h1>Hello, I'm <span id="name">Sakshi Singh</span> 👋</h1>
        <p class="tagline">Future Cloud Engineer | AWS Learner</p>
        
        <div class="clock-box">
            <h3>Current Time:</h3>
            <div id="clock"></div>
        </div>

        <div class="card">
            <h2>About Me</h2>
            <p>I'm learning cloud computing with AWS. This is my first website with HTML, CSS and JavaScript!</p>
            <button id="colorBtn">Change My Color</button>
        </div>

        <div class="card">
            <h2>My Skills</h2>
            <ul id="skillsList">
                <li>HTML ✅</li>
                <li>CSS ✅</li>
                <li>JavaScript ✅</li>
                <li>AWS S3 ✅</li>
            </ul>
            <input type="text" id="newSkill" placeholder="Add new skill">
            <button id="addSkillBtn">Add Skill</button>
        </div>

        <div class="card">
            <h2>Contact Me</h2>
            <input type="text" id="userName" placeholder="Your Name">
            <button id="greetBtn">Say Hi</button>
            <p id="greeting"></p>
        </div>

        <p class="footer">Projects completed: <span id="counter">4</span></p>
    </div>

    <script src="script.js"></script>
</body>
</html>
